<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Chess</title>
    <link href="chess_1.css" rel="stylesheet">
    <style>

    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <div class="turn-indicator">
            <div class="turn-dot" id="turnDot"></div>
            <span id="turnText">White's Turn</span>
        </div>
        <div class="status-msg" id="statusMsg">Game Start</div>
    </div>

    <div class="captured-area">
        <div class="captured-pieces" id="capturedWhite"></div>
        <div class="captured-pieces" id="capturedBlack"></div>
    </div>

    <div class="board-wrapper">
        <div class="board" id="board">
            <!-- Squares generated by JS -->
        </div>
    </div>

    <div class="controls">
        <button onclick="game.reset()">New Game</button>
        <button class="secondary" onclick="game.flipBoard()">Flip Board</button>
    </div>
</div>

<script src="chess_1.js">

</script>
</body>
</html>
