<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris - Mode 1 & 2 Joueurs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fontsource.org/press-start-2p" rel="stylesheet">
    <link href="tetris_1.css" rel="stylesheet">
    <style>

    </style>
</head>
<body class="text-white h-screen w-screen flex flex-col items-center justify-center relative">

<!-- Overlay for Menu -->
<div id="menu-overlay" class="absolute inset-0 bg-black bg-opacity-80 z-50 flex flex-col items-center justify-center space-y-8">
    <h1 class="text-6xl text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600 drop-shadow-lg">TETRIS</h1>
    <div class="flex flex-col space-y-4">
        <button onclick="startGame(1)" class="px-8 py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded shadow-lg transform transition hover:scale-105 border-2 border-blue-400">
            1 JOUEUR
        </button>
        <button onclick="startGame(2)" class="px-8 py-4 bg-green-600 hover:bg-green-500 text-white font-bold rounded shadow-lg transform transition hover:scale-105 border-2 border-green-400">
            2 JOUEURS
        </button>
    </div>
    <p class="text-xs text-gray-400 mt-8">Joueur 1: Flèches | Joueur 2: WASD</p>
</div>

<!-- Game Over Modal -->
<div id="game-over-modal" class="hidden absolute inset-0 bg-black bg-opacity-90 z-50 flex flex-col items-center justify-center space-y-6">
    <h2 class="text-4xl text-red-500 blink">GAME OVER</h2>
    <div id="final-scores" class="text-center space-y-2"></div>
    <button onclick="location.reload()" class="px-6 py-3 bg-white text-black font-bold hover:bg-gray-200 rounded">
        REJOUER
    </button>
</div>

<!-- Main Game Container -->
<div id="game-container" class="w-full h-full flex flex-col md:flex-row items-center justify-center p-4 space-y-4 md:space-y-0 md:space-x-8">

    <!-- Player 1 Area -->
    <div id="p1-area" class="flex flex-col items-center space-y-2 transition-all duration-300">
        <div class="flex justify-between w-full max-w-xs mb-2">
            <span class="text-blue-400 text-sm">JOUEUR 1</span>
            <span class="text-yellow-400 text-sm">Score: <span id="p1-score">0</span></span>
        </div>

        <div class="flex space-x-4">
            <!-- Board -->
            <div id="p1-board" class="game-board w-64 h-[640px]"></div>

            <!-- Sidebar -->
            <div class="flex flex-col space-y-4 w-24">
                <div class="bg-gray-800 p-2 rounded border border-gray-600">
                    <p class="text-xs text-center mb-1 text-gray-400">SUIVANT</p>
                    <div id="p1-next" class="next-piece-preview w-16 h-16 mx-auto"></div>
                </div>
                <div class="bg-gray-800 p-2 rounded border border-gray-600">
                    <p class="text-xs text-center mb-1 text-gray-400">LIGNES</p>
                    <p id="p1-lines" class="text-center text-sm">0</p>
                </div>
                <div class="bg-gray-800 p-2 rounded border border-gray-600">
                    <p class="text-xs text-center mb-1 text-gray-400">NIVEAU</p>
                    <p id="p1-level" class="text-center text-sm">1</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Player 2 Area (Hidden by default) -->
    <div id="p2-area" class="hidden flex flex-col items-center space-y-2 transition-all duration-300">
        <div class="flex justify-between w-full max-w-xs mb-2">
            <span class="text-green-400 text-sm">JOUEUR 2</span>
            <span class="text-yellow-400 text-sm">Score: <span id="p2-score">0</span></span>
        </div>

        <div class="flex space-x-4">
            <!-- Board -->
            <div id="p2-board" class="game-board w-64 h-[640px]"></div>

            <!-- Sidebar -->
            <div class="flex flex-col space-y-4 w-24">
                <div class="bg-gray-800 p-2 rounded border border-gray-600">
                    <p class="text-xs text-center mb-1 text-gray-400">SUIVANT</p>
                    <div id="p2-next" class="next-piece-preview w-16 h-16 mx-auto"></div>
                </div>
                <div class="bg-gray-800 p-2 rounded border border-gray-600">
                    <p class="text-xs text-center mb-1 text-gray-400">LIGNES</p>
                    <p id="p2-lines" class="text-center text-sm">0</p>
                </div>
                <div class="bg-gray-800 p-2 rounded border border-gray-600">
                    <p class="text-xs text-center mb-1 text-gray-400">NIVEAU</p>
                    <p id="p2-level" class="text-center text-sm">1</p>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="tetris_1.js">

</script>
</body>
</html>
