<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --bg-color: #1a1a1a;
            --game-bg: #000000;
            --accent: #4ade80;
            --text-color: #f0f0f0;
            --panel-bg: #2a2a2a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Press Start 2P', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .game-container {
            position: relative;
            padding: 20px;
            border-radius: 15px;
            background: var(--panel-bg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .score-board {
            font-size: 1.2rem;
            color: var(--accent);
            text-shadow: 2px 2px 0px #000;
        }

        canvas {
            background-color: var(--game-bg);
            border: 4px solid #333;
            border-radius: 4px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            image-rendering: pixelated; /* Essential for crisp pixel art */
            max-width: 100%;
            height: auto;
        }

        .controls-hint {
            font-size: 0.7rem;
            color: #888;
            margin-top: 10px;
            text-align: center;
            line-height: 1.5;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 15px;
            backdrop-filter: blur(2px);
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 10px;
            text-shadow: 4px 4px 0px #000;
            text-align: center;
            line-height: 1.2;
        }

        p {
            font-size: 0.8rem;
            color: #ccc;
            margin-bottom: 30px;
            text-align: center;
            max-width: 80%;
        }

        button {
            background: var(--accent);
            border: 4px solid #000;
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 1rem;
            cursor: pointer;
            color: #000;
            transition: transform 0.1s, filter 0.1s;
            box-shadow: 0 6px 0 #000;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #000;
        }

        button:hover {
            filter: brightness(1.1);
        }

        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
            width: 100%;
            max-width: 300px;
        }

        .d-pad-btn {
            background: #333;
            border: 2px solid #555;
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 4px 0 #111;
        }

        .d-pad-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #111;
        }

        .d-pad-up { grid-column: 2; }
        .d-pad-left { grid-column: 1; grid-row: 2; }
        .d-pad-down { grid-column: 2; grid-row: 2; }
        .d-pad-right { grid-column: 3; grid-row: 2; }

        @media (max-width: 600px) {
            .mobile-controls {
                display: grid;
            }
            .controls-hint {
                display: none;
            }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <div class="score-board">SCORE: <span id="scoreEl">0</span></div>
        <div class="score-board">HIGH: <span id="highScoreEl">0</span></div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls-hint">
        Use Arrow Keys or WASD to Move<br>
        Space to Pause
    </div>

    <div class="mobile-controls">
        <div class="d-pad-btn d-pad-up" onclick="game.handleInput('ArrowUp')">▲</div>
        <div class="d-pad-btn d-pad-left" onclick="game.handleInput('ArrowLeft')">◀</div>
        <div class="d-pad-btn d-pad-down" onclick="game.handleInput('ArrowDown')">▼</div>
        <div class="d-pad-btn d-pad-right" onclick="game.handleInput('ArrowRight')">▶</div>
    </div>

    <!-- Start Screen Overlay -->
    <div id="startScreen" class="overlay">
        <h1>SNAKE</h1>
        <p>Eat apples to grow.<br>Don't hit the walls!</p>
        <button id="startBtn">START GAME</button>
    </div>

    <!-- Game Over Overlay -->
    <div id="gameOverScreen" class="overlay hidden">
        <h1 style="color: #ef4444;">GAME OVER</h1>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button id="restartBtn">TRY AGAIN</button>
    </div>

    <!-- Pause Overlay -->
    <div id="pauseScreen" class="overlay hidden">
        <h1>PAUSED</h1>
        <button id="resumeBtn">RESUME</button>
    </div>
</div>

<script>
    class SnakeGame {
        constructor() {
            this.canvas = document.getElementById('gameCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.gridSize = 20; // Size of one tile
            this.tileCount = this.canvas.width / this.gridSize;

            // Assets
            this.sprites = new Image();
            this.sprites.src = 'https://image.qwenlm.ai/public_source/762d6c91-581c-4697-8b31-0487abda3ed8/1228321f9-2231-4cf4-a583-36011af67f5f.png';
            this.spritesLoaded = false;
            this.sprites.onload = () => { this.spritesLoaded = true; };

            // State
            this.score = 0;
            this.highScore = localStorage.getItem('snakeHighScore') || 0;
            this.gameRunning = false;
            this.gamePaused = false;
            this.speed = 7; // Moves per second
            this.lastRenderTime = 0;

            // Entities
            this.snake = [];
            this.velocity = { x: 0, y: 0 };
            this.inputQueue = [];
            this.food = { x: 5, y: 5 };

            // DOM Elements
            this.scoreEl = document.getElementById('scoreEl');
            this.highScoreEl = document.getElementById('highScoreEl');
            this.finalScoreEl = document.getElementById('finalScore');
            this.startScreen = document.getElementById('startScreen');
            this.gameOverScreen = document.getElementById('gameOverScreen');
            this.pauseScreen = document.getElementById('pauseScreen');

            this.highScoreEl.innerText = this.highScore;

            // Bindings
            this.handleKeydown = this.handleKeydown.bind(this);
            this.gameLoop = this.gameLoop.bind(this);

            // Listeners
            document.addEventListener('keydown', this.handleKeydown);
            document.getElementById('startBtn').addEventListener('click', () => this.startGame());
            document.getElementById('restartBtn').addEventListener('click', () => this.startGame());
            document.getElementById('resumeBtn').addEventListener('click', () => this.togglePause());

            this.resetState();
            this.draw(); // Initial draw
        }

        resetState() {
            this.snake = [{ x: 10, y: 10 }, { x: 10, y: 11 }, { x: 10, y: 12 }];
            this.velocity = { x: 0, y: -1 };
            this.inputQueue = [];
            this.score = 0;
            this.speed = 7;
            this.placeFood();
            this.updateScore(0);
        }

        startGame() {
            this.resetState();
            this.gameRunning = true;
            this.gamePaused = false;
            this.startScreen.classList.add('hidden');
            this.gameOverScreen.classList.add('hidden');
            this.pauseScreen.classList.add('hidden');
            window.requestAnimationFrame(this.gameLoop);
        }

        togglePause() {
            if (!this.gameRunning) return;
            this.gamePaused = !this.gamePaused;
            if (this.gamePaused) {
                this.pauseScreen.classList.remove('hidden');
            } else {
                this.pauseScreen.classList.add('hidden');
                this.lastRenderTime = performance.now(); // Reset timer to prevent jump
                window.requestAnimationFrame(this.gameLoop);
            }
        }

        gameOver() {
            this.gameRunning = false;
            if (this.score > this.highScore) {
                this.highScore = this.score;
                localStorage.setItem('snakeHighScore', this.highScore);
                this.highScoreEl.innerText = this.highScore;
            }
            this.finalScoreEl.innerText = this.score;
            this.gameOverScreen.classList.remove('hidden');
        }

        handleKeydown(e) {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                e.preventDefault();
            }

            if (e.key === ' ') {
                this.togglePause();
                return;
            }

            if (!this.gameRunning || this.gamePaused) return;

            this.inputQueue.push(e.key);
        }

        handleInput(key) {
            if (!this.gameRunning || this.gamePaused) return;
            this.inputQueue.push(key);
        }

        processInput() {
            if (this.inputQueue.length === 0) return;

            const key = this.inputQueue.shift();
            const goingUp = this.velocity.y === -1;
            const goingDown = this.velocity.y === 1;
            const goingRight = this.velocity.x === 1;
            const goingLeft = this.velocity.x === -1;

            switch (key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (!goingDown) this.velocity = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (!goingUp) this.velocity = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (!goingRight) this.velocity = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (!goingLeft) this.velocity = { x: 1, y: 0 };
                    break;
            }
            // Process next input immediately if queue not empty (for quick turns)
            if (this.inputQueue.length > 0) this.processInput();
        }

        update() {
            this.processInput();

            const head = {
                x: this.snake[0].x + this.velocity.x,
                y: this.snake[0].y + this.velocity.y
            };

            // Wall Collision
            if (head.x < 0 || head.x >= this.tileCount || head.y < 0 || head.y >= this.tileCount) {
                this.gameOver();
                return;
            }

            // Self Collision
            for (let i = 0; i < this.snake.length; i++) {
                if (head.x === this.snake[i].x && head.y === this.snake[i].y) {
                    this.gameOver();
                    return;
                }
            }

            this.snake.unshift(head);

            // Food Collision
            if (head.x === this.food.x && head.y === this.food.y) {
                this.score += 10;
                this.updateScore(this.score);
                this.speed = Math.min(20, 7 + Math.floor(this.score / 50)); // Increase speed
                this.placeFood();
            } else {
                this.snake.pop();
            }
        }

        placeFood() {
            let valid = false;
            while (!valid) {
                this.food = {
                    x: Math.floor(Math.random() * this.tileCount),
                    y: Math.floor(Math.random() * this.tileCount)
                };
                valid = !this.snake.some(segment => segment.x === this.food.x && segment.y === this.food.y);
            }
        }

        updateScore(val) {
            this.scoreEl.innerText = val;
        }

        draw() {
            // Clear Canvas
            this.ctx.fillStyle = '#000000';
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

            // Draw Grid (Subtle)
            this.ctx.strokeStyle = '#111';
            this.ctx.lineWidth = 1;
            for (let i = 0; i <= this.tileCount; i++) {
                this.ctx.beginPath();
                this.ctx.moveTo(i * this.gridSize, 0);
                this.ctx.lineTo(i * this.gridSize, this.canvas.height);
                this.ctx.stroke();
                this.ctx.beginPath();
                this.ctx.moveTo(0, i * this.gridSize);
                this.ctx.lineTo(this.canvas.width, i * this.gridSize);
                this.ctx.stroke();
            }

            if (this.spritesLoaded) {
                // Draw Food (Apple) - Sprite index 2 in row 0
                this.ctx.drawImage(
                    this.sprites,
                    2 * 32, 0, 32, 32,
                    this.food.x * this.gridSize, this.food.y * this.gridSize,
                    this.gridSize, this.gridSize
                );

                // Draw Snake
                this.snake.forEach((segment, index) => {
                    const isHead = index === 0;
                    // Sprite mapping: Head(0), Body(1) in row 0
                    const spriteX = isHead ? 0 : 1;

                    this.ctx.drawImage(
                        this.sprites,
                        spriteX * 32, 0, 32, 32,
                        segment.x * this.gridSize, segment.y * this.gridSize,
                        this.gridSize, this.gridSize
                    );
                });
            } else {
                // Fallback if image fails
                this.ctx.fillStyle = '#ef4444';
                this.ctx.fillRect(this.food.x * this.gridSize + 2, this.food.y * this.gridSize + 2, this.gridSize - 4, this.gridSize - 4);

                this.snake.forEach((segment, index) => {
                    this.ctx.fillStyle = index === 0 ? '#4ade80' : '#22c55e';
                    this.ctx.fillRect(segment.x * this.gridSize + 1, segment.y * this.gridSize + 1, this.gridSize - 2, this.gridSize - 2);
                });
            }
        }

        gameLoop(currentTime) {
            if (!this.gameRunning || this.gamePaused) return;

            window.requestAnimationFrame(this.gameLoop);

            const secondsSinceLastRender = (currentTime - this.lastRenderTime) / 1000;
            if (secondsSinceLastRender < 1 / this.speed) return;

            this.lastRenderTime = currentTime;

            this.update();
            this.draw();
        }
    }

    const game = new SnakeGame();
</script>
</body>
</html>
