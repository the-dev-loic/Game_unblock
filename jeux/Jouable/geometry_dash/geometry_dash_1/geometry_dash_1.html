<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo Dash</title>
    <style>

    </style>
</head>
<body>
<div id="wrap">
    <canvas id="c" width="800" height="420"></canvas>
    <div id="hud" class="hide">Essais: <span id="tries">1</span></div>
    <div id="pct" class="hide"><span id="prog">0</span>%</div>

    <div class="overlay" id="scr-menu">
        <h1 style="color:#00ffcc">GEO DASH</h1>
        <button class="btn btn-play" onclick="startPlay()">▶ JOUER</button>
        <button class="btn btn-edit" onclick="startEditor()">✏ ÉDITEUR</button>
    </div>

    <div class="overlay hide" id="scr-over">
        <h1 style="color:#ff3333">ÉCHEC !</h1>
        <button class="btn btn-play" onclick="restartPlay()">RECOMMENCER</button>
        <button class="btn btn-menu" onclick="showMenu()">MENU</button>
    </div>

    <div class="overlay hide" id="scr-win">
        <h1 style="color:#00ffcc">NIVEAU TERMINÉ !</h1>
        <p style="color:#aaa;font-size:13px">Essais : <span id="final-tries">1</span></p>
        <button class="btn btn-play" onclick="restartPlay()">REJOUER</button>
        <button class="btn btn-menu" onclick="showMenu()">MENU</button>
    </div>

    <div id="ebar-btns" class="hide">
        <button id="btn-clear" onclick="clearLevel()">Effacer</button>
        <button id="btn-save" onclick="saveLevel()">Sauver</button>
        <button id="btn-test" onclick="testLevel()">Tester ▶</button>
        <button id="btn-quit" onclick="showMenu()">Quitter</button>
    </div>

    <div id="editor-bar" class="hide">
        <div class="tbtn active" id="t-block" onclick="selTool('block')">🟦</div>
        <div class="tbtn" id="t-spike" onclick="selTool('spike')">🔺</div>
        <div class="tbtn" id="t-erase" onclick="selTool('erase')">❌</div>
        <span id="etip">Clic gauche : placer | Clic droit : effacer<br>Flèches ← → pour scroller</span>
    </div>
</div>
<p class="hint">ESPACE / CLIC pour sauter</p>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 800, H = 420, TS = 40;
    const GRAVITY = 0.65, JUMP_FORCE = -12, SPEED = 5;

    // ===================== NIVEAU PAR DÉFAUT =====================
    function defaultLevel() {
        const d = {};
        // Sol continu de colonne 0 à 51 sur la ligne y=9
        for (let x = 0; x < 52; x++) d[`${x},9`] = 'block';

        const obs = [
            [5,8,'spike'],
            [9,8,'spike'],[10,8,'spike'],
            [13,8,'block'],[14,8,'block'],[13,7,'spike'],
            [18,8,'spike'],[19,8,'spike'],[20,8,'spike'],
            [24,8,'block'],[24,7,'block'],[25,8,'spike'],
            [29,8,'block'],[30,8,'block'],[30,7,'block'],[29,7,'spike'],
            [34,8,'spike'],[35,8,'spike'],[36,8,'spike'],
            [40,8,'block'],[40,7,'block'],[40,6,'block'],[41,8,'spike'],
            [45,8,'spike'],[46,8,'spike'],
            [49,8,'block'],[49,7,'block'],
        ];
        obs.forEach(([x,y,t]) => d[`${x},${y}`] = t);
        return { blocks: d, length: 52 * TS };
    }

    // ===================== ÉTAT =====================
    let levelData = {}, levelLen = 2000;
    let state = 'menu';
    let cam = 0, tries = 1;
    let drawTool = 'block', isDrawing = false, rightDraw = false;
    let particles = [];
    let player = { x:0, y:0, vy:0, grounded:false, angle:0, dead:false };

    function loadLevel() {
        const s = localStorage.getItem('geodash_v4');
        if (s) { const d=JSON.parse(s); levelData=d.blocks||{}; levelLen=d.length||2000; }
        else { const d=defaultLevel(); levelData=d.blocks; levelLen=d.length; }
    }
    function saveLevel() {
        localStorage.setItem('geodash_v4', JSON.stringify({blocks:levelData,length:levelLen}));
        alert('Sauvegardé !');
    }
    function clearLevel() {
        if (confirm('Tout effacer ?')) { const d=defaultLevel(); levelData=d.blocks; levelLen=d.length; }
    }

    // ===================== UI =====================
    function hide(id){ document.getElementById(id).classList.add('hide'); }
    function show(id){ document.getElementById(id).classList.remove('hide'); }
    function hideAll(){ ['scr-menu','scr-over','scr-win','hud','pct','editor-bar','ebar-btns'].forEach(hide); }
    function showMenu(){ state='menu'; cam=0; hideAll(); show('scr-menu'); }
    function startPlay(){ state='play'; tries=1; resetPlayer(); hideAll(); show('hud'); show('pct'); document.getElementById('tries').textContent=tries; }
    function restartPlay(){ tries++; state='play'; resetPlayer(); hideAll(); show('hud'); show('pct'); document.getElementById('tries').textContent=tries; }
    function startEditor(){ state='editor'; cam=0; hideAll(); show('editor-bar'); show('ebar-btns'); }
    function testLevel(){ startPlay(); }

    function resetPlayer() {
        // Joueur posé juste au-dessus de la tuile sol (y=9 => pixel 360)
        // Joueur height = TS = 40, donc top = 360 - 40 = 320
        player.x = 80;
        player.y = 9 * TS - TS; // 320
        player.vy = 0;
        player.angle = 0;
        player.grounded = false;
        player.dead = false;
        cam = 0;
        particles = [];
    }

    // ===================== INPUT =====================
    document.addEventListener('keydown', e => {
        if (['Space','ArrowUp','KeyW'].includes(e.code)) { e.preventDefault(); jump(); }
        if (state === 'editor') {
            if (e.code === 'ArrowRight') cam += TS;
            if (e.code === 'ArrowLeft')  cam = Math.max(0, cam - TS);
        }
    });
    canvas.addEventListener('click', () => { if (state==='play') jump(); });
    canvas.addEventListener('mousedown', e => { if (state==='editor'){ isDrawing=true; rightDraw=e.button===2; editAt(e); }});
    canvas.addEventListener('mousemove', e => { if (isDrawing && state==='editor') editAt(e); });
    canvas.addEventListener('mouseup', () => isDrawing=false);
    canvas.addEventListener('contextmenu', e => e.preventDefault());
    canvas.addEventListener('touchstart', e=>{ e.preventDefault(); if(state==='play') jump(); },{passive:false});

    function jump() {
        if (!player.dead && player.grounded) {
            player.vy = JUMP_FORCE;
            player.grounded = false;
        }
    }

    function selTool(t) {
        drawTool = t;
        ['block','spike','erase'].forEach(n => {
            const el = document.getElementById('t-'+n);
            if (el) el.classList.toggle('active', n===t);
        });
    }

    function editAt(e) {
        const r = canvas.getBoundingClientRect();
        const scaleX = canvas.width / r.width;
        const scaleY = canvas.height / r.height;
        const mx = (e.clientX - r.left) * scaleX + cam;
        const my = (e.clientY - r.top) * scaleY;
        const gx = Math.floor(mx / TS);
        const gy = Math.floor(my / TS);
        if (gy < 0 || gy > 10) return;
        const key = `${gx},${gy}`;
        if (rightDraw || drawTool==='erase') delete levelData[key];
        else levelData[key] = drawTool;
    }

    // ===================== COLLISIONS =====================
    // Méthode robuste : on sépare les axes et on teste pixel par pixel les coins

    function isSolid(gx, gy) {
        if (gy < 0) return true;  // plafond monde
        if (gy > 20) return false;
        if (gx < 0) return false;
        return levelData[`${gx},${gy}`] === 'block';
    }

    function update() {
        if (player.dead) return;

        // --- Mouvement horizontal ---
        player.x += SPEED;
        cam = Math.max(0, player.x - 160);

        // --- Gravité ---
        player.vy = Math.min(player.vy + GRAVITY, 20);
        player.y += player.vy;
        player.grounded = false;

        // --- Résolution collisions verticales ---
        // On travaille avec les pixels exacts du joueur
        const L = player.x + 2;       // bord gauche hitbox
        const R = player.x + TS - 2;  // bord droit hitbox

        if (player.vy >= 0) {
            // Chute vers le bas : tester le bas du joueur
            const botY = player.y + TS;
            const gy = Math.floor(botY / TS);
            if (isSolid(Math.floor(L / TS), gy) || isSolid(Math.floor(R / TS), gy)) {
                player.y = gy * TS - TS;  // poser le joueur sur le dessus de la tuile
                player.vy = 0;
                player.grounded = true;
            }
        } else {
            // Monte vers le haut : tester le haut du joueur
            const topY = player.y;
            const gy = Math.floor(topY / TS);
            if (isSolid(Math.floor(L / TS), gy) || isSolid(Math.floor(R / TS), gy)) {
                player.y = (gy + 1) * TS;
                player.vy = 2;
                die();
                return;
            }
        }

        // --- Résolution collisions horizontales ---
        // Côté droit uniquement (le joueur va toujours à droite)
        const T = player.y + 4;
        const B = player.y + TS - 4;
        const rightX = player.x + TS;
        const gxR = Math.floor(rightX / TS);
        if (isSolid(gxR, Math.floor(T / TS)) || isSolid(gxR, Math.floor(B / TS))) {
            die();
            return;
        }

        // --- Collisions pics ---
        resolveSpikes();

        // --- Chute dans le vide ---
        if (player.y > H + 100) die();

        // --- Victoire ---
        if (player.x > levelLen) { win(); return; }

        // --- Rotation ---
        if (!player.grounded) player.angle += 0.13;
        else {
            const snap = Math.round(player.angle / (Math.PI/2)) * (Math.PI/2);
            player.angle += (snap - player.angle) * 0.25;
        }

        // --- Progression ---
        document.getElementById('prog').textContent = Math.min(100, Math.floor(player.x / levelLen * 100));
    }

    function resolveSpikes() {
        const pad = 9;
        const L = player.x + pad, R = player.x + TS - pad;
        const T = player.y + pad, B = player.y + TS - pad;

        const x0 = Math.floor(L / TS), x1 = Math.floor(R / TS);
        const y0 = Math.floor(T / TS), y1 = Math.floor(B / TS);

        for (let gx = x0; gx <= x1; gx++) {
            for (let gy = y0; gy <= y1; gy++) {
                if (levelData[`${gx},${gy}`] !== 'spike') continue;
                const sx = gx*TS + pad, sy = gy*TS + pad;
                const sw = TS - pad*2, sh = TS - pad*2;
                if (R > sx && L < sx+sw && B > sy && T < sy+sh) {
                    die(); return;
                }
            }
        }
    }

    function die() {
        if (player.dead) return;
        player.dead = true;
        for (let i = 0; i < 14; i++) {
            particles.push({
                x: player.x + TS/2, y: player.y + TS/2,
                vx: (Math.random()-0.5)*9, vy: (Math.random()-0.5)*9 - 2,
                life: 45, maxLife: 45,
                color: ['#ffcc00','#ff6600','#ffffff','#ff3333'][Math.floor(Math.random()*4)]
            });
        }
        setTimeout(() => { if (state==='play'){ state='over'; show('scr-over'); }}, 450);
    }

    function win() {
        state = 'win';
        document.getElementById('final-tries').textContent = tries;
        hideAll(); show('scr-win');
    }

    function updateParticles() {
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.35; p.life--; });
    }

    // ===================== DESSIN =====================
    function drawBG() {
        const g = ctx.createLinearGradient(0, 0, 0, H);
        g.addColorStop(0, '#2b1055'); g.addColorStop(1, '#7597de');
        ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        for (let i = 0; i < 50; i++) {
            const sx = ((i*173 + cam*0.15) % W + W) % W;
            const sy = (i*97) % (H*0.6);
            ctx.fillRect(sx, sy, i%3===0?2:1, i%3===0?2:1);
        }
    }

    function drawLevel() {
        for (const key in levelData) {
            const [gx, gy] = key.split(',').map(Number);
            const type = levelData[key];
            const x = gx*TS - cam, y = gy*TS;
            if (x + TS < 0 || x > W) continue;

            if (type === 'block') {
                ctx.fillStyle = '#00ddbb'; ctx.fillRect(x, y, TS, TS);
                ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(x+5, y+5, TS-10, TS-10);
                ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fillRect(x+2, y+2, TS-4, 7);
                ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 1.5; ctx.strokeRect(x, y, TS, TS);
            } else if (type === 'spike') {
                ctx.fillStyle = '#ff0055';
                ctx.beginPath();
                ctx.moveTo(x+2, y+TS-2); ctx.lineTo(x+TS/2, y+4); ctx.lineTo(x+TS-2, y+TS-2);
                ctx.closePath(); ctx.fill();
                ctx.strokeStyle='#ff6688'; ctx.lineWidth=1; ctx.stroke();
            }
        }
        const ex = levelLen - cam;
        if (ex > 0 && ex < W) {
            ctx.strokeStyle='#00ff00'; ctx.lineWidth=4;
            ctx.beginPath(); ctx.moveTo(ex,0); ctx.lineTo(ex,H); ctx.stroke();
            ctx.fillStyle='#00ff00'; ctx.font='bold 14px Arial';
            ctx.textAlign='right'; ctx.fillText('FIN', ex-4, 24); ctx.textAlign='left';
        }
    }

    function drawPlayer() {
        particles.forEach(p => {
            ctx.globalAlpha = p.life / p.maxLife;
            ctx.fillStyle = p.color;
            const s = 6*(p.life/p.maxLife);
            ctx.fillRect(p.x - cam - s/2, p.y - s/2, s, s);
        });
        ctx.globalAlpha = 1;
        if (player.dead) return;

        const cx = player.x + TS/2 - cam;
        const cy = player.y + TS/2;
        ctx.save();
        ctx.translate(cx, cy); ctx.rotate(player.angle);
        ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(-TS/2+3, -TS/2+3, TS, TS);
        ctx.fillStyle = '#ffcc00'; ctx.fillRect(-TS/2, -TS/2, TS, TS);
        ctx.fillStyle = 'rgba(255,160,0,0.45)'; ctx.fillRect(-TS/2+5, -TS/2+5, TS-10, TS-10);
        ctx.fillStyle = '#222'; ctx.fillRect(3, -11, 7, 7); ctx.fillRect(3, 3, 7, 7);
        ctx.strokeStyle = '#cc9900'; ctx.lineWidth = 2; ctx.strokeRect(-TS/2, -TS/2, TS, TS);
        ctx.restore();
    }

    function drawEditorGrid() {
        const sx = Math.floor(cam/TS)*TS;
        ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
        for (let x=sx; x<cam+W; x+=TS){ ctx.beginPath(); ctx.moveTo(x-cam,0); ctx.lineTo(x-cam,H); ctx.stroke(); }
        for (let y=0; y<H; y+=TS){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
        ctx.fillStyle='rgba(0,255,200,0.06)'; ctx.fillRect(0, 9*TS, W, TS);
        ctx.fillStyle='rgba(0,255,200,0.5)'; ctx.font='10px Arial'; ctx.fillText('SOL', 4, 9*TS+14);
    }

    // ===================== LOOP =====================
    function loop() {
        if (state==='play') { update(); updateParticles(); }
        else if (state==='over') updateParticles();
        drawBG();
        if (state==='editor') drawEditorGrid();
        drawLevel();
        drawPlayer();
        requestAnimationFrame(loop);
    }

    loadLevel();
    loop();
</script>
</body>
</html>
