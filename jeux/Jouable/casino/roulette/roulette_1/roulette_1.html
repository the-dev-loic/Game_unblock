<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Casino Réaliste - 2 Joueurs</title>
    <link href="roulette_1.css" rel="stylesheet">
    <style>

    </style>
</head>
<body>

<header>
    <h1>Casino Royal</h1>
    <div class="stats-bar">
        <div class="player-stat p1-stat active" id="p1-stat">
            <div>Joueur 1</div>
            <div class="balance" id="p1-balance">1000 €</div>
            <div class="current-bet">Mise: <span id="p1-current-bet">0</span> €</div>
        </div>
        <div class="player-stat p2-stat" id="p2-stat">
            <div>Joueur 2</div>
            <div class="balance" id="p2-balance">1000 €</div>
            <div class="current-bet">Mise: <span id="p2-current-bet">0</span> €</div>
        </div>
    </div>
</header>

<div class="game-container">
    <div class="wheel-section">
        <div class="marker"></div>
        <div class="wheel-container">
            <div class="wheel" id="wheel">
                <!-- Wheel segments generated by JS -->
            </div>
            <div class="wheel-center" id="wheel-center">0</div>
            <div class="ball-track"></div>
            <div class="ball" id="ball"></div>
        </div>
        <div class="game-log" id="game-log"></div>
    </div>

    <div class="board-section">
        <div class="betting-board" id="betting-board">
            <!-- Board generated by JS -->
        </div>
    </div>
</div>

<div class="controls-area">
    <div class="chip-selector" id="chip-selector">
        <div class="chip chip-10 selected" data-value="10">10</div>
        <div class="chip chip-50" data-value="50">50</div>
        <div class="chip chip-100" data-value="100">100</div>
        <div class="chip chip-500" data-value="500">500</div>
    </div>
    <div class="action-buttons">
        <button class="btn-clear" id="btn-clear">Retirer</button>
        <button class="btn-spin" id="btn-spin">Lancer la Roue</button>
    </div>
</div>

<div class="overlay" id="result-overlay">
    <div class="result-box">
        <h2>Résultat</h2>
        <div class="result-number" id="result-number">24</div>
        <div class="result-color" id="result-color" style="color: var(--red); font-weight:bold;">ROUGE</div>
        <div class="winner-text" id="winner-text">Joueur 1 Gagne 500€ !</div>
        <button class="close-btn" id="btn-next-round">Nouveau Tour</button>
    </div>
</div>

<script src="roulette_1.js">


</script>
</body>
</html>
