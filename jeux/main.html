<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Menu Jeux Complet</title>
    <style>
        body {
            background: #222;
            color: #eee;
            font-family: Arial, sans-serif;
            margin: 0; padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #menu {
            background: #333;
            padding: 20px 30px;
            border-radius: 8px;
            max-width: 420px;
            width: 100%;
            min-height: 320px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .list {
            flex-grow: 1;
            overflow-y: auto;
        }
        ul {
            list-style: none;
            padding-left: 0;
        }
        li {
            margin-bottom: 8px;
        }
        button.item-btn {
            width: 100%;
            text-align: left;
            background: #4caf50;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            font-size: 1em;
        }
        button.item-btn:hover {
            background: #66bb6a;
        }
        button#back-btn {
            margin-top: 10px;
            padding: 8px 15px;
            background: #f44336;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            display: none;
        }
        button#back-btn:hover {
            background: #ef5350;
        }
    </style>
</head>
<body>

<div id="menu">
    <h1>Menu de Jeux</h1>
    <div class="list" id="list-container"></div>
    <button id="back-btn">← Retour</button>
</div>

<script>
    const menuData = {
        "casino": {
            "all_in_one": {
                "v1.html": "casino/all_in_one/v1.html",
                "v2.html": "casino/all_in_one/v2.html"
            },
            "roulette": {
                "roulette.html": "casino/roulette/roulette.html",
                "roulette_claude.html": "casino/roulette/roulette_claude.html"
            }
        },
        "chess": {
            "chess.html": "chess/chess.html"
        },
        "combat_2_joueur": {
            "a_debug": {
                "jeu-combat (1).html": "combat_2_joueur/a_debug/jeu-combat (1).html",
                "jeu-combat (2).html": "combat_2_joueur/a_debug/jeu-combat (2).html",
                "jeu_chat_claude.html": "combat_2_joueur/a_debug/jeu_chat_claude.html"
            },
            "fonctionnel": {
                "testtt.html": "combat_2_joueur/fonctionnel/testtt.html"
            }
        },
        "cookie": {
            "cokkie_clicker.html": "cookie/cokkie_clicker.html"
        },
        "farmer": {
            "a_debug": {
                "test_3.html": "farmer/a_debug/test_3.html",
                "test_4.html": "farmer/a_debug/test_4.html"
            },
            "fonctionnel": {
                "test_2.html": "farmer/fonctionnel/test_2.html"
            }
        },
        "geometry_dash": {
            "geometry_dash.html": "geometry_dash/geometry_dash.html"
        },
        "pacman": {
            "pacman.html": "pacman/pacman.html"
        },
        "shooter": {
            "a_debug": {
                "test_4.html": "shooter/a_debug/test_4.html"
            },
            "fonctionnel": {
                "modifiable": {
                    "test_3.html": "shooter/fonctionnel/modifiable/test_3.html"
                },
                "parfait": {
                    "test_1.html": "shooter/fonctionnel/parfait/test_1.html",
                    "test_2.html": "shooter/fonctionnel/parfait/test_2.html",
                    "test_4.html": "shooter/fonctionnel/parfait/test_4.html",
                    "test_5.html": "shooter/fonctionnel/parfait/test_5.html"
                }
            },
            "simulation": {
                "jeux_chat.html": "shooter/simulation/jeux_chat.html"
            }
        },
        "snake": {
            "snake.html": "snake/snake.html",
            "main.html": "snake/main.html"
        }
    };

    const listContainer = document.getElementById("list-container");
    const backBtn = document.getElementById("back-btn");

    let currentPath = [];

    function renderList(data) {
        listContainer.innerHTML = "";
        const ul = document.createElement("ul");

        for (const key in data) {
            const li = document.createElement("li");
            const btn = document.createElement("button");
            btn.className = "item-btn";
            btn.textContent = key;

            if (typeof data[key] === "string") {
                btn.onclick = () => window.open(data[key], "_blank");
            } else {
                btn.onclick = () => {
                    currentPath.push(key);
                    updateView();
                };
            }

            li.appendChild(btn);
            ul.appendChild(li);
        }
        listContainer.appendChild(ul);
    }

    function getDataAtPath(path) {
        let current = menuData;
        for (const p of path) {
            current = current[p];
        }
        return current;
    }

    function updateView() {
        if (currentPath.length === 0) {
            backBtn.style.display = "none";
        } else {
            backBtn.style.display = "block";
        }
        const data = getDataAtPath(currentPath);
        renderList(data);
    }

    backBtn.onclick = () => {
        currentPath.pop();
        updateView();
    };

    updateView();
</script>

</body>
</html>
