<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Auto Farmer V2</title>

    <style>

        body{
            font-family:Arial;
            background:#2e7d32;
            color:white;
            margin:0;
            text-align:center;
        }

        #menu{
            background:#1b5e20;
            padding:10px;
            display:flex;
            justify-content:space-between;
        }

        .panel{
            display:none;
            background:#263238;
            padding:10px;
        }

        #game{
            display:grid;
            grid-template-columns:repeat(11,60px);
            grid-gap:4px;
            justify-content:center;
            margin:20px;
        }

        .tile{
            width:60px;
            height:60px;
            background:#6d4c41;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:22px;
        }

        .farmer{
            background:#fdd835;
        }

        textarea{
            width:450px;
            height:200px;
        }

        button{
            padding:6px 12px;
            margin:3px;
        }

    </style>
</head>

<body>

<div id="menu">

    <div>🌾 Auto Farmer V2</div>

    <div>
        <button onclick="toggle('wiki')">📚 Wiki</button>
        <button onclick="toggle('shop')">🛒 Shop</button>
        <button onclick="toggle('upgrade')">⬆️ Upgrade</button>
        <button onclick="sellAll()">💰 Sell</button>
    </div>

</div>

<div id="wiki" class="panel">

<pre>

move("north")
move("south")
move("east")
move("west")

plant("wheat")
plant("carrot")
plant("corn")

harvest()

for i in range(5){
move("east")
}

if canHarvest(){
harvest()
}

while canHarvest(){
harvest()
}

</pre>

</div>

<div id="shop" class="panel">

    <button onclick="buy('wheat')">Wheat Seed $2</button>
    <button onclick="buy('carrot')">Carrot Seed $3</button>
    <button onclick="buy('corn')">Corn Seed $5</button>

</div>

<div id="upgrade" class="panel">

    <button onclick="upgradeWheat()">Upgrade Wheat Value $50</button>

    <br>

    Wheat price : <span id="wheatPrice"></span>

</div>

<h2>Farm</h2>

<div id="game"></div>

<div>

    💰 Money: <span id="money"></span>

    <br><br>

    Inventory
    🌾 <span id="wheat"></span>
    🥕 <span id="carrot"></span>
    🌽 <span id="corn"></span>

    <br><br>

    Seeds
    🌾 <span id="sw"></span>
    🥕 <span id="sc"></span>
    🌽 <span id="sco"></span>

</div>

<h3>Program</h3>

<textarea id="code">

for i in range(10){

move("east")

plant("wheat")

if canHarvest(){
harvest()
}

}

</textarea>

<br>

<button onclick="runCode()">▶ Run</button>

<script>

    const size=20
    const view=5

    const crops={
        wheat:{grow:3,price:5,emoji:"🌾"},
        carrot:{grow:4,price:7,emoji:"🥕"},
        corn:{grow:5,price:10,emoji:"🌽"}
    }

    let farm=[]
    let farmer={x:10,y:10}

    let inventory={wheat:0,carrot:0,corn:0}
    let seeds={wheat:5,carrot:3,corn:2}

    let upgrades={wheatValue:0}

    let money=20

    function init(){

        for(let y=0;y<size;y++){

            farm[y]=[]

            for(let x=0;x<size;x++)
                farm[y][x]=null

        }

        draw()

    }

    function draw(){

        const game=document.getElementById("game")
        game.innerHTML=""

        for(let y=farmer.y-view;y<=farmer.y+view;y++){
            for(let x=farmer.x-view;x<=farmer.x+view;x++){

                let tile=document.createElement("div")
                tile.className="tile"

                if(x>=0 && y>=0 && x<size && y<size){

                    let cell=farm[y][x]

                    if(cell)
                        tile.innerHTML=crops[cell.type].emoji

                    if(farmer.x==x && farmer.y==y){

                        tile.classList.add("farmer")
                        tile.innerHTML="👨‍🌾"

                    }

                }

                game.appendChild(tile)

            }
        }

        document.getElementById("money").innerText=money

        document.getElementById("wheat").innerText=inventory.wheat
        document.getElementById("carrot").innerText=inventory.carrot
        document.getElementById("corn").innerText=inventory.corn

        document.getElementById("sw").innerText=seeds.wheat
        document.getElementById("sc").innerText=seeds.carrot
        document.getElementById("sco").innerText=seeds.corn

        document.getElementById("wheatPrice").innerText=
            crops.wheat.price+upgrades.wheatValue

    }

    function move(d){

        if(d=="east") farmer.x++
        if(d=="west") farmer.x--

        if(d=="south") farmer.y++
        if(d=="north") farmer.y--

        farmer.x=Math.max(0,Math.min(size-1,farmer.x))
        farmer.y=Math.max(0,Math.min(size-1,farmer.y))

    }

    function plant(t){

        if(!farm[farmer.y][farmer.x] && seeds[t]>0){

            farm[farmer.y][farmer.x]={type:t,age:0}
            seeds[t]--

        }

    }

    function canHarvest(){

        let c=farm[farmer.y][farmer.x]

        if(!c) return false

        return c.age>=crops[c.type].grow

    }

    function harvest(){

        let c=farm[farmer.y][farmer.x]

        if(c && canHarvest()){

            inventory[c.type]++
            farm[farmer.y][farmer.x]=null

        }

    }

    function growTick(){

        for(let y=0;y<size;y++)
            for(let x=0;x<size;x++){

                let c=farm[y][x]

                if(c) c.age++

            }

        draw()

    }

    setInterval(growTick,3000)

    function buy(type){

        const price={wheat:2,carrot:3,corn:5}

        if(money>=price[type]){

            money-=price[type]
            seeds[type]++

        }

        draw()

    }

    function sellAll(){

        for(let c in inventory){

            let v=crops[c].price

            if(c=="wheat")
                v+=upgrades.wheatValue

            money+=inventory[c]*v
            inventory[c]=0

        }

        draw()

    }

    function upgradeWheat(){

        if(money>=50){

            money-=50
            upgrades.wheatValue+=2

        }

        draw()

    }

    function parse(code){

        code=code.replace(/for i in range\((\d+)\)\{([\s\S]*?)\}/g,(m,n,b)=>{

            let r=""

            for(let i=0;i<n;i++)
                r+=b

            return r

        })

        code=code.replace(/if canHarvest\(\)\{([\s\S]*?)\}/g,(m,b)=>{

            if(canHarvest()) return b
            return ""

        })

        code=code.replace(/while canHarvest\(\)\{([\s\S]*?)\}/g,(m,b)=>{

            let r=""

            while(canHarvest())
                r+=b

            return r

        })

        return code

    }

    async function runCode(){

        let code=parse(document.getElementById("code").value).split("\n")

        for(let line of code){

            line=line.trim()

            if(line.startsWith("move")){

                let d=line.match(/"(.*?)"/)[1]
                move(d)

            }

            if(line.startsWith("plant")){

                let t=line.match(/"(.*?)"/)[1]
                plant(t)

            }

            if(line=="harvest()")
                harvest()

            draw()

            await new Promise(r=>setTimeout(r,300))

        }

    }

    function toggle(id){

        let p=document.getElementById(id)

        p.style.display=p.style.display=="block"?"none":"block"

    }

    init()

</script>

</body>
</html>
