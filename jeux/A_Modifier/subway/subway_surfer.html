<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Runner 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui-layer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .hud {
            padding: 20px; display: flex; justify-content: space-between;
            color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-weight: bold; font-size: 24px;
        }
        .score-container {
            background: rgba(0,0,0,0.3); padding: 10px 20px;
            border-radius: 20px; backdrop-filter: blur(5px);
        }
        #start-screen, #game-over-screen {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            pointer-events: auto; z-index: 10; transition: opacity 0.3s;
        }
        h1 { color: #FFD700; font-size: 60px; margin-bottom: 10px; text-shadow: 4px 4px 0 #000; text-transform: uppercase; letter-spacing: 5px; }
        p { color: white; font-size: 20px; margin-bottom: 30px; }
        button {
            background: linear-gradient(to bottom, #4CAF50, #2E7D32);
            border: none; padding: 15px 40px; color: white;
            font-size: 24px; font-weight: bold; border-radius: 50px;
            cursor: pointer; box-shadow: 0 6px 0 #1B5E20;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        button:active { transform: translateY(4px); box-shadow: 0 2px 0 #1B5E20; }
        .hidden { opacity: 0; pointer-events: none; }
        #controls-hint {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7); font-size: 16px; text-align: center;
        }
        .key {
            display: inline-block; background: rgba(255,255,255,0.2);
            padding: 5px 10px; border-radius: 5px; margin: 0 5px;
        }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="hud">
            <div class="score-container"><span>SCORE: </span><span id="score">0</span></div>
            <div class="score-container"><span>COINS: </span><span id="coins">0</span></div>
        </div>
        <div id="controls-hint">
            Use <span class="key">←</span> <span class="key">→</span> to move and <span class="key">↑</span> to jump
        </div>
    </div>

    <div id="start-screen">
        <h1>Subway Runner</h1>
        <p>Dodge trains, collect coins!</p>
        <button id="start-btn">PLAY NOW</button>
    </div>

    <div id="game-over-screen" class="hidden">
        <h1>Game Over</h1>
        <p>Final Score: <span id="final-score">0</span></p>
        <button id="restart-btn">TRY AGAIN</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // ── Constants ────────────────────────────────────────────────────────────
    const LANE_WIDTH     = 3;
    const JUMP_FORCE     = 0.3;
    const GRAVITY        = 0.015;
    const BASE_SPEED     = 0.5;
    const MAX_SPEED      = 1.2;
    const SPEED_INC      = 0.0005;

    // Spawn distances (units travelled, not frame count)
    const OBSTACLE_EVERY = 30;
    const COIN_EVERY     = 15;
    const SCENERY_EVERY  = 20;

    // ── Game State ───────────────────────────────────────────────────────────
    let gameState = { isPlaying: false, score: 0, coins: 0, speed: BASE_SPEED, distance: 0 };

    // Thresholds for deterministic spawning (avoids float % issues)
    let nextObstacle = OBSTACLE_EVERY;
    let nextCoin     = COIN_EVERY;
    let nextScenery  = SCENERY_EVERY;

    // ── Three.js Setup ───────────────────────────────────────────────────────
    const canvas   = document.getElementById('gameCanvas');
    const scene    = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog        = new THREE.Fog(0x87CEEB, 20, 100);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 8);
    camera.lookAt(0, 0, -5);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;

    // ── Lighting ─────────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, 10);
    dirLight.castShadow = true;
    Object.assign(dirLight.shadow.camera, { left: -20, right: 20, top: 20, bottom: -20 });
    dirLight.shadow.mapSize.set(2048, 2048);
    scene.add(dirLight);

    // ── Ground (tiled & scrolling) ────────────────────────────────────────────
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x7bed9f });

    // Two ground tiles that leapfrog each other for infinite scrolling
    const TILE_LENGTH = 80;
    const groundTiles = [0, 1].map(i => {
        const geo  = new THREE.PlaneGeometry(30, TILE_LENGTH);
        const mesh = new THREE.Mesh(geo, groundMat);
        mesh.rotation.x = -Math.PI / 2;
        mesh.receiveShadow = true;
        mesh.position.z = -i * TILE_LENGTH;
        scene.add(mesh);
        return mesh;
    });

    // Grid on top of ground
    const gridMat = new THREE.LineBasicMaterial({ color: 0x2ed573, transparent: true, opacity: 0.4 });
    const gridTiles = [0, 1].map(i => {
        const helper = new THREE.GridHelper(30, 30, 0x2ed573, 0x2ed573);
        helper.material = gridMat;
        helper.position.y = 0.01;
        helper.position.z = -i * TILE_LENGTH;
        scene.add(helper);
        return helper;
    });

    // ── Player ────────────────────────────────────────────────────────────────
    const playerGroup = new THREE.Group();
    scene.add(playerGroup);

    const character = new THREE.Mesh(
        new THREE.BoxGeometry(1, 2, 1),
        new THREE.MeshStandardMaterial({ color: 0xff4757 })
    );
    character.position.y = 1;
    character.castShadow = true;
    playerGroup.add(character);

    const head = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 0.8, 0.8),
        new THREE.MeshStandardMaterial({ color: 0xffccaa })
    );
    head.position.y = 2.4;
    head.castShadow = true;
    playerGroup.add(head);

    let playerState = { lane: 0, y: 0, velocityY: 0, isJumping: false };

    // ── Object Pools ──────────────────────────────────────────────────────────
    let obstacles = [], coinsArr = [], scenery = [];

    // ── Texture Loader ────────────────────────────────────────────────────────
    const tl = new THREE.TextureLoader();

    // ── Helpers ───────────────────────────────────────────────────────────────
    function randLane() { return Math.floor(Math.random() * 3) - 1; }

    function createObstacle(lane, z) {
        const isTrain = Math.random() > 0.5;
        let geo, h;
        if (isTrain) { geo = new THREE.BoxGeometry(2.5, 3, 8);   h = 1.5; }
        else          { geo = new THREE.BoxGeometry(2.5, 1.5, 1); h = 0.75; }
        const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: isTrain ? 0x2255cc : 0xee6622 }));
        mesh.position.set(lane * LANE_WIDTH, h, z);
        mesh.castShadow = mesh.receiveShadow = true;
        scene.add(mesh);
        return { mesh, lane, z, type: isTrain ? 'train' : 'barrier' };
    }

    function createCoin(lane, z) {
        const mesh = new THREE.Mesh(
            new THREE.CylinderGeometry(0.5, 0.5, 0.1, 16),
            new THREE.MeshStandardMaterial({ color: 0xFFD700, emissive: 0xffff00, emissiveIntensity: 0.5 })
        );
        mesh.rotation.x = Math.PI / 2;
        mesh.position.set(lane * LANE_WIDTH, 1, z);
        scene.add(mesh);
        return { mesh, lane, z, collected: false };
    }

    function createScenery(z) {
        const side   = Math.random() > 0.5 ? 1 : -1;
        const x      = side * (8 + Math.random() * 5);
        const height = 5 + Math.random() * 10;
        const mesh   = new THREE.Mesh(
            new THREE.BoxGeometry(4, height, 4),
            new THREE.MeshStandardMaterial({ color: 0x8888aa })
        );
        mesh.position.set(x, height / 2, z);
        mesh.castShadow = mesh.receiveShadow = true;
        scene.add(mesh);
        return { mesh, z };
    }

    // ── Spawn logic ───────────────────────────────────────────────────────────
    // BUG FIX 2: use threshold tracking instead of `distance % N === 0`
    function spawnObjects() {
        const d = gameState.distance;

        if (d >= nextObstacle) {
            nextObstacle += OBSTACLE_EVERY;
            if (Math.random() > 0.2) obstacles.push(createObstacle(randLane(), -80));
        }
        if (d >= nextCoin) {
            nextCoin += COIN_EVERY;
            coinsArr.push(createCoin(randLane(), -80));
        }
        if (d >= nextScenery) {
            nextScenery += SCENERY_EVERY;
            if (Math.random() > 0.4) scenery.push(createScenery(-80));
        }
    }

    // ── Player Update ─────────────────────────────────────────────────────────
    function updatePlayer() {
        const targetX = playerState.lane * LANE_WIDTH;
        playerGroup.position.x += (targetX - playerGroup.position.x) * 0.2;

        if (playerState.isJumping) {
            playerState.y        += playerState.velocityY;
            playerState.velocityY -= GRAVITY;
            if (playerState.y <= 0) {
                playerState.y        = 0;
                playerState.isJumping = false;
                playerState.velocityY = 0;
            }
        }

        // BUG FIX 3: set playerGroup.position.y so Box3 world coords are correct
        playerGroup.position.y = playerState.y;

        if (!playerState.isJumping) {
            const bob = Math.sin(Date.now() * 0.015) * 0.1;
            character.position.y = 1 + bob;
            head.position.y      = 2.4 + bob;
        }

        playerGroup.rotation.z = (playerGroup.position.x - targetX) * -0.1;
        playerGroup.rotation.x += 0.05;
    }

    // ── Objects Update ────────────────────────────────────────────────────────
    function updateObjects() {
        const mv = gameState.speed;

        // Ground scrolling (leapfrog tiles)
        for (const tile of groundTiles) {
            tile.position.z += mv;
            if (tile.position.z > TILE_LENGTH / 2) tile.position.z -= TILE_LENGTH * 2;
        }
        for (const tile of gridTiles) {
            tile.position.z += mv;
            if (tile.position.z > TILE_LENGTH / 2) tile.position.z -= TILE_LENGTH * 2;
        }

        // Obstacles
        for (let i = obstacles.length - 1; i >= 0; i--) {
            const obs = obstacles[i];
            obs.z += mv;
            obs.mesh.position.z = obs.z;

            // BUG FIX 3: world-space Box3 collision (playerGroup.position.y already correct)
            if (obs.z > -3 && obs.z < 3 && obs.lane === playerState.lane) {
                const pb = new THREE.Box3().setFromObject(playerGroup);
                const ob = new THREE.Box3().setFromObject(obs.mesh);
                // Shrink boxes slightly to avoid hair-trigger collisions
                pb.expandByScalar(-0.2);
                ob.expandByScalar(-0.2);
                if (pb.intersectsBox(ob)) { gameOver(); return; }
            }

            if (obs.z > 12) { scene.remove(obs.mesh); obstacles.splice(i, 1); }
        }

        // Coins
        for (let i = coinsArr.length - 1; i >= 0; i--) {
            const coin = coinsArr[i];
            coin.z += mv;
            coin.mesh.position.z = coin.z;
            coin.mesh.rotation.y += 0.05;

            if (!coin.collected && coin.z > -2 && coin.z < 2
                && coin.lane === playerState.lane && playerState.y < 2.5) {
                coin.collected = true;
                gameState.coins++;
                gameState.score += 50;
                document.getElementById('coins').textContent = gameState.coins;
                scene.remove(coin.mesh);
                coinsArr.splice(i, 1);
                continue;
            }
            if (coin.z > 12) { scene.remove(coin.mesh); coinsArr.splice(i, 1); }
        }

        // Scenery
        for (let i = scenery.length - 1; i >= 0; i--) {
            const s = scenery[i];
            s.z += mv;
            s.mesh.position.z = s.z;
            if (s.z > 12) { scene.remove(s.mesh); scenery.splice(i, 1); }
        }
    }

    // ── Game Loop ─────────────────────────────────────────────────────────────
    // BUG FIX 1: renderer.render() called every frame
    function gameLoop() {
        if (!gameState.isPlaying) return;

        gameState.distance += gameState.speed;
        gameState.score     = Math.floor(gameState.distance) + gameState.coins * 50;
        gameState.speed     = Math.min(MAX_SPEED, gameState.speed + SPEED_INC);

        document.getElementById('score').textContent = gameState.score;

        spawnObjects();
        updatePlayer();
        updateObjects();

        renderer.render(scene, camera);   // ← FIX 1
        requestAnimationFrame(gameLoop);
    }

    // ── Start / Reset ─────────────────────────────────────────────────────────
    function startGame() {
        gameState = { isPlaying: true, score: 0, coins: 0, speed: BASE_SPEED, distance: 0 };
        playerState = { lane: 0, y: 0, velocityY: 0, isJumping: false };

        nextObstacle = OBSTACLE_EVERY;
        nextCoin     = COIN_EVERY;
        nextScenery  = SCENERY_EVERY;

        obstacles.forEach(o => scene.remove(o.mesh));
        coinsArr.forEach(c => scene.remove(c.mesh));
        scenery.forEach(s => scene.remove(s.mesh));
        obstacles = []; coinsArr = []; scenery = [];

        playerGroup.position.set(0, 0, 0);
        playerGroup.rotation.set(0, 0, 0);

        document.getElementById('score').textContent = '0';
        document.getElementById('coins').textContent = '0';
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-over-screen').classList.add('hidden');

        gameLoop();
    }

    function gameOver() {
        gameState.isPlaying = false;
        document.getElementById('final-score').textContent = gameState.score;
        document.getElementById('game-over-screen').classList.remove('hidden');
    }

    // ── Input ─────────────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
        if (!gameState.isPlaying) return;
        if      (e.key === 'ArrowLeft'  || e.key === 'a') playerState.lane = Math.max(-1, playerState.lane - 1);
        else if (e.key === 'ArrowRight' || e.key === 'd') playerState.lane = Math.min(1,  playerState.lane + 1);
        else if ((e.key === 'ArrowUp' || e.key === ' ' || e.key === 'w') && !playerState.isJumping) {
            playerState.isJumping = true;
            playerState.velocityY = JUMP_FORCE;
        }
    });

    // BUG FIX 5: touch/swipe support for mobile
    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', e => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, { passive: true });
    canvas.addEventListener('touchend', e => {
        if (!gameState.isPlaying) return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) > Math.abs(dy)) {
            if (dx < -20) playerState.lane = Math.max(-1, playerState.lane - 1);
            else if (dx > 20) playerState.lane = Math.min(1, playerState.lane + 1);
        } else if (dy < -20 && !playerState.isJumping) {
            playerState.isJumping = true;
            playerState.velocityY = JUMP_FORCE;
        }
    }, { passive: true });

    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('restart-btn').addEventListener('click', startGame);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Initial static render
    renderer.render(scene, camera);
</script>
</body>
</html>
